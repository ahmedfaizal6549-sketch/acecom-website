<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AceCom Lanka</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="announcement-bar">
    <p>Free shipping on orders over Rs. 50,000 | Use code ACECOM20 for 20% off</p>
  </div>

  <nav class="navbar">
    <div class="container">
      <div class="logo"><a href="index.html">AceCom</a></div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="nav-icons">
        <a href="login.html" class="nav-icon auth-link" title="Login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
        <div class="user-menu" style="display:none;">
          <span class="user-name nav-icon" style="color:white;font-size:13px;"></span>
          <button class="nav-icon" onclick="signOut()" title="Logout">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
        <button class="nav-icon cart-icon" id="cart-btn" onclick="window.location.href='cart.html'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-badge" id="cart-count">0</span>
        </button>
      </div>
      <button class="hamburger" id="hamburger-btn">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="mobile-nav" id="mobile-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>

  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-card">
        <h1>Welcome Back</h1>
        <p>Sign in to your AceCom account</p>

        <div class="auth-error" id="login-error" style="display:none;"></div>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
        </form>

        <div class="auth-divider"><span>or</span></div>

        <p class="auth-switch">Don't have an account? <a href="signup.html">Create one</a></p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 AceCom. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <div id="toast-container" class="toast-container"></div>
  <script src="js/supabase-config.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.textContent = 'Signing in...';
      btn.disabled = true;
      errorEl.style.display = 'none';

      try {
        await signIn(email, password);
        showToast('Welcome back!', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } catch (err) {
        errorEl.textContent = err.message || 'Invalid email or password';
        errorEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
